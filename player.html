<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>My Music Player (Web)</title>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; margin: 16px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  button, select, input[type="text"] { padding: 8px 10px; font-size: 14px; }
  .spacer { flex: 1; }
  .box { border: 1px solid #ddd; border-radius: 10px; padding: 10px; }
  .list { list-style: none; padding: 0; margin: 0; }
  .item {
    display:flex; align-items:center; gap:10px;
    padding: 10px; border-top: 1px solid #eee;
    user-select:none;
  }
  .item:first-child { border-top: none; }
  .item.playing { background: #f2f7ff; }
  .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .meta { font-size: 12px; color: #666; }
  .handle { cursor: grab; opacity: .6; }
  .log { white-space: pre-wrap; font-size: 12px; }
  input[type="range"] { width: 100%; }
  #pickedName {
    font-size: 14px;
    color: #444;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
</style>
</head>
<body>

<h2>マイ音楽プレイヤー（Web）</h2>

<div class="box">
  <div class="row">
    <label>Playlist:</label>
    <select id="plSelect"></select>
    <button id="plNew">＋</button>
    <button id="plRename">名前</button>
    <button id="plDelete">削除</button>
    <span class="spacer"></span>
    <button id="editToggle">編集: OFF</button>
  </div>
</div>

<br/>

<div class="box">
  <div class="row">
    <!-- iPhone対策で accept を広めに。まずは multiple なしで安定優先 -->
    <input id="filePick" type="file" accept="*/*" multiple />
    <span id="pickedName">未選択</span>
  </div>

  <div class="row" style="margin-top:8px;">
    <button id="sortNum">番号順ソート</button>
    <span class="spacer"></span>
    <button id="clearTracks">曲を全消し(このリストだけ)</button>
  </div>

  <hr/>

  <div class="row">
    <button id="prev">⏮</button>
    <button id="back10">-10s</button>
    <button id="play">▶︎/⏸</button>
    <button id="fwd10">+10s</button>
    <button id="next">⏭</button>
    <button id="stop">⏹</button>
  </div>

  <p id="now">未再生</p>

  <div>
    <input id="seek" type="range" min="0" max="1" step="0.01" value="0"/>
    <div class="row">
      <span class="meta" id="tCur">0:00</span>
      <span class="spacer"></span>
      <span class="meta" id="tDur">0:00</span>
    </div>
  </div>

  <audio id="audio" controls playsinline></audio>
</div>

<br/>

<div class="box">
  <h3 style="margin:0 0 8px 0;">プレイリスト（タップで準備 / 編集ONで並べ替え）</h3>
  <ul id="trackList" class="list"></ul>
</div>

<br/>

<div class="box">
  <div class="row">
    <b>ログ</b>
    <span class="spacer"></span>
    <button id="logClear">消去</button>
  </div>
  <div id="log" class="log"></div>
</div>

<script>
/** ---------------------------
 *  Data model & persistence
 * -------------------------- */
const STORE_KEY = "my_music_player_web_v2";

function loadStore() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch {
    return null;
  }
}
function saveStore(store) {
  localStorage.setItem(STORE_KEY, JSON.stringify(store));
}

function defaultStore() {
  return {
    playlists: [{ id: crypto.randomUUID(), name: "Default", tracks: [] }],
    selectedId: null
  };
}

let store = loadStore() || defaultStore();
if (!store.selectedId) store.selectedId = store.playlists[0]?.id || null;

function plIndexById(id){ return store.playlists.findIndex(p => p.id === id); }
function currentPL() {
  const i = plIndexById(store.selectedId);
  return (i >= 0) ? store.playlists[i] : null;
}

/** Track object:
 * { id, name, fileId, durationSec? }
 * fileId is a key to fileMap (in-memory only) -> File, objectURL
 */
let fileMap = new Map(); // fileId -> { file, url }
let audio = document.getElementById("audio");
let currentIndex = -1;
let editMode = false;
let scrubbing = false;

/** ---------------------------
 *  UI elements
 * -------------------------- */
const plSelect = document.getElementById("plSelect");
const plNew = document.getElementById("plNew");
const plRename = document.getElementById("plRename");
const plDelete = document.getElementById("plDelete");
const editToggle = document.getElementById("editToggle");

const filePick = document.getElementById("filePick");
const pickedName = document.getElementById("pickedName");
const sortNum = document.getElementById("sortNum");
const clearTracks = document.getElementById("clearTracks");

const btnPrev = document.getElementById("prev");
const btnBack10 = document.getElementById("back10");
const btnPlay = document.getElementById("play");
const btnFwd10 = document.getElementById("fwd10");
const btnNext = document.getElementById("next");
const btnStop = document.getElementById("stop");

const now = document.getElementById("now");
const seek = document.getElementById("seek");
const tCur = document.getElementById("tCur");
const tDur = document.getElementById("tDur");

const trackList = document.getElementById("trackList");
const logEl = document.getElementById("log");
const logClear = document.getElementById("logClear");

function log(msg){
  const line = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logEl.textContent = (logEl.textContent ? logEl.textContent + "\n" : "") + line;
  console.log(msg);
}

function formatTime(sec){
  if (!isFinite(sec) || sec < 0) return "0:00";
  sec = Math.floor(sec);
  const m = Math.floor(sec/60);
  const s = sec % 60;
  return `${m}:${String(s).padStart(2,"0")}`;
}

/** ---------------------------
 *  Render
 * -------------------------- */
function renderPlaylists(){
  plSelect.innerHTML = "";
  store.playlists.forEach(p => {
    const opt = document.createElement("option");
    opt.value = p.id;
    opt.textContent = p.name;
    plSelect.appendChild(opt);
  });
  plSelect.value = store.selectedId;
}

function renderTracks(){
  const pl = currentPL();
  trackList.innerHTML = "";
  if (!pl || pl.tracks.length === 0){
    const li = document.createElement("li");
    li.className = "item";
    li.innerHTML = `<span class="name meta">（曲がありません）</span>`;
    trackList.appendChild(li);
    return;
  }

  pl.tracks.forEach((t, i) => {
    const li = document.createElement("li");
    li.className = "item" + (i === currentIndex ? " playing" : "");
    li.draggable = editMode;
    li.dataset.index = i;

    const handle = document.createElement("span");
    handle.className = "handle";
    handle.textContent = editMode ? "☰" : "";

    const name = document.createElement("span");
    name.className = "name";
    name.textContent = t.name;

    const meta = document.createElement("span");
    meta.className = "meta";
    meta.textContent = t.durationSec ? formatTime(t.durationSec) : "";

    const del = document.createElement("button");
    del.textContent = "削除";
    del.onclick = (ev) => {
      ev.stopPropagation();
      removeTrack(i);
    };

    // タップしたら「再生準備」だけ
    li.onclick = async () => {
  prepareTrack(i);
  await playCurrent();
};

    li.appendChild(handle);
    li.appendChild(name);
    li.appendChild(meta);
    li.appendChild(del);

    li.addEventListener("dragstart", (e)=>{
      e.dataTransfer.setData("text/plain", String(i));
    });
    li.addEventListener("dragover", (e)=>{
      if (!editMode) return;
      e.preventDefault();
    });
    li.addEventListener("drop", (e)=>{
      if (!editMode) return;
      e.preventDefault();
      const from = Number(e.dataTransfer.getData("text/plain"));
      const to = i;
      moveTrack(from, to);
    });

    trackList.appendChild(li);
  });
}

/** ---------------------------
 *  Track operations
 * -------------------------- */
function leadingNumber(name){
  const m = name.match(/^(\d+)/);
  return m ? parseInt(m[1],10) : null;
}

function sortByFilenameNumeric(){
  const pl = currentPL();
  if (!pl) return;

  const currentTrackId = (currentIndex>=0 && pl.tracks[currentIndex]) ? pl.tracks[currentIndex].id : null;

  pl.tracks.sort((a,b)=>{
    const na = leadingNumber(a.name);
    const nb = leadingNumber(b.name);
    if (na != null && nb != null && na !== nb) return na - nb;
    return a.name.localeCompare(b.name, undefined, {numeric:true, sensitivity:"base"});
  });

  if (currentTrackId){
    currentIndex = pl.tracks.findIndex(t => t.id === currentTrackId);
  }

  saveStore(store);
  log("ソート: ファイル名(番号)順");
  renderTracks();
}

function moveTrack(from, to){
  const pl = currentPL();
  if (!pl) return;
  if (from===to) return;
  if (from<0||to<0||from>=pl.tracks.length||to>=pl.tracks.length) return;

  const currentTrackId = (currentIndex>=0 && pl.tracks[currentIndex]) ? pl.tracks[currentIndex].id : null;

  const [item] = pl.tracks.splice(from,1);
  pl.tracks.splice(to,0,item);

  if (currentTrackId){
    currentIndex = pl.tracks.findIndex(t=>t.id===currentTrackId);
  }

  saveStore(store);
  log("並べ替え: 手動");
  renderTracks();
}

function removeTrack(i){
  const pl = currentPL();
  if (!pl) return;
  if (i<0 || i>=pl.tracks.length) return;

  const removing = pl.tracks[i];
  pl.tracks.splice(i,1);

  if (currentIndex === i){
    stop();
    currentIndex = -1;
  } else if (currentIndex > i){
    currentIndex -= 1;
  }
  if (pl.tracks.length === 0) currentIndex = -1;

  saveStore(store);
  log(`リストから削除: ${removing.name}（ファイル自体は消さない）`);
  renderTracks();
}

function clearCurrentPlaylistTracks(){
  const pl = currentPL();
  if (!pl) return;
  stop();
  currentIndex = -1;
  pl.tracks = [];
  saveStore(store);
  log("このプレイリストの曲を全消去（参照だけ）");
  renderTracks();
}

/** ---------------------------
 *  Audio playback
 * -------------------------- */
function ensureURLForTrack(track){
  const entry = fileMap.get(track.fileId);
  if (!entry) return null;
  if (!entry.url) entry.url = URL.createObjectURL(entry.file);
  return entry.url;
}

function prepareTrack(i){
  const pl = currentPL();
  if (!pl || pl.tracks.length===0) return;
  if (i<0 || i>=pl.tracks.length) return;

  const t = pl.tracks[i];
  const url = ensureURLForTrack(t);
  if (!url){
    log("準備失敗: ファイル参照がありません（ページを開き直したら再選択が必要）");
    return;
  }

  currentIndex = i;
  audio.src = url;
  now.textContent = `準備完了: ${t.name}`;
  renderTracks();
  log(`準備完了: ${t.name}`);
}

async function playCurrent(){
  const pl = currentPL();
  if (!pl || pl.tracks.length===0){
    log("play()失敗: プレイリストが空です");
    return;
  }

  if (currentIndex < 0) {
    prepareTrack(0);
  }

  try {
    await audio.play();
    const t = currentPL()?.tracks[currentIndex];
    now.textContent = t ? `再生中: ${t.name}` : "再生中";
    log("再生開始");
  } catch (e) {
    log(`play()失敗: ${e?.name || e} / ${e?.message || ""}`);
  }
}

function pause(){
  audio.pause();
  log("一時停止");
}
function stop(){
  audio.pause();
  try { audio.currentTime = 0; } catch {}
  now.textContent = "停止";
  log("停止");
}
function next(){
  const pl = currentPL();
  if (!pl) return;
  if (currentIndex+1 < pl.tracks.length) {
    prepareTrack(currentIndex+1);
    playCurrent();
  } else {
    log("最後の曲 → 停止");
    stop();
  }
}
function prev(){
  const pl = currentPL();
  if (!pl || pl.tracks.length===0) return;
  prepareTrack(Math.max(0, currentIndex-1));
  playCurrent();
}

/** Seek UI */
audio.addEventListener("timeupdate", ()=>{
  if (scrubbing) return;
  const d = audio.duration;
  if (isFinite(d) && d>0){
    seek.max = String(d);
    seek.value = String(audio.currentTime);
    tCur.textContent = formatTime(audio.currentTime);
    tDur.textContent = formatTime(d);
  }
});

seek.addEventListener("input", ()=>{
  scrubbing = true;
  tCur.textContent = formatTime(Number(seek.value));
});

seek.addEventListener("change", ()=>{
  const v = Number(seek.value);
  if (isFinite(v)) audio.currentTime = v;
  scrubbing = false;
});

/** Auto next */
audio.addEventListener("ended", ()=>{
  log("曲終了 → 次へ");
  next();
});

/** ---------------------------
 *  File import
 * -------------------------- */
filePick.addEventListener("change", async ()=>{
  const pl = currentPL();
  if (!pl) {
    log("filePick change: current playlist がありません");
    return;
  }

  const picked = Array.from(filePick.files || []);
  log(`filePick change: files=${picked.length}`);

  if (picked.length===0) {
    pickedName.textContent = "未選択";
    return;
  }

  pickedName.textContent = picked.map(f => f.name).join(", ");

  for (const f of picked){
    const fileId = crypto.randomUUID();
    fileMap.set(fileId, { file: f, url: null });

    const track = { id: crypto.randomUUID(), name: f.name, fileId, durationSec: null };
    pl.tracks.push(track);
    log(`追加予定: ${f.name} type=${f.type || "(unknown)"}`);

    try {
      const tmp = document.createElement("audio");
      tmp.src = URL.createObjectURL(f);

      await new Promise(res=>{
        tmp.addEventListener("loadedmetadata", res, { once:true });
        tmp.addEventListener("error", res, { once:true });
        setTimeout(res, 1000);
      });

      if (isFinite(tmp.duration) && tmp.duration>0) {
        track.durationSec = tmp.duration;
      }
      URL.revokeObjectURL(tmp.src);
    } catch (e) {
      log(`duration取得失敗: ${f.name} / ${e?.name || e}`);
    }
  }

  saveStore(store);
  renderTracks();

  if (currentIndex < 0 && pl.tracks.length > 0) {
    prepareTrack(0);
  }

  // 同じファイルを再選択できるように
  filePick.value = "";

  log(`追加完了: ${picked.length}件`);
});

/** ---------------------------
 *  Playlist operations (UI)
 * -------------------------- */
plSelect.addEventListener("change", ()=>{
  store.selectedId = plSelect.value;
  saveStore(store);
  stop();
  currentIndex = -1;
  renderTracks();
  log("プレイリスト切替");
});

plNew.addEventListener("click", ()=>{
  const name = prompt("新規プレイリスト名", "New Playlist");
  if (!name) return;
  const p = { id: crypto.randomUUID(), name, tracks: [] };
  store.playlists.push(p);
  store.selectedId = p.id;
  saveStore(store);
  renderPlaylists();
  stop();
  currentIndex = -1;
  renderTracks();
  log(`プレイリスト作成: ${name}`);
});

plRename.addEventListener("click", ()=>{
  const pl = currentPL();
  if (!pl) return;
  const name = prompt("プレイリスト名変更", pl.name);
  if (!name) return;
  pl.name = name;
  saveStore(store);
  renderPlaylists();
  log(`プレイリスト名変更: ${name}`);
});

plDelete.addEventListener("click", ()=>{
  if (store.playlists.length<=1){
    alert("最後の1つは削除できません");
    return;
  }
  const pl = currentPL();
  if (!pl) return;
  if (!confirm(`プレイリスト「${pl.name}」を削除しますか？`)) return;

  const idx = plIndexById(pl.id);
  store.playlists.splice(idx,1);
  store.selectedId = store.playlists[0].id;
  saveStore(store);
  renderPlaylists();
  stop();
  currentIndex = -1;
  renderTracks();
  log("プレイリスト削除");
});

/** ---------------------------
 *  Buttons
 * -------------------------- */
sortNum.addEventListener("click", sortByFilenameNumeric);
clearTracks.addEventListener("click", clearCurrentPlaylistTracks);

btnPlay.addEventListener("click", async ()=>{
  if (audio.paused) {
    await playCurrent();
  } else {
    pause();
  }
});

btnStop.addEventListener("click", stop);
btnNext.addEventListener("click", next);
btnPrev.addEventListener("click", prev);
btnBack10.addEventListener("click", ()=>{
  audio.currentTime = Math.max(0, audio.currentTime - 10);
});
btnFwd10.addEventListener("click", ()=>{
  audio.currentTime = Math.min(isFinite(audio.duration) ? audio.duration : 1e9, audio.currentTime + 10);
});

editToggle.addEventListener("click", ()=>{
  editMode = !editMode;
  editToggle.textContent = `編集: ${editMode ? "ON" : "OFF"}`;
  renderTracks();
});

logClear.addEventListener("click", ()=>{
  logEl.textContent = "";
});

/** ---------------------------
 *  Initial render
 * -------------------------- */
renderPlaylists();
renderTracks();
log("起動しました（Web版）");
log("注意: Web版はページを閉じるとローカルファイル参照が切れるため、再選択が必要です。");
</script>
</body>
</html>
